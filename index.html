<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Tempahan STPU - ITU</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">

<meta name="theme-color" content="#135c2d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STPU ITU">
<meta name="mobile-web-app-capable" content="yes">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0d3d20 0%, #1a7a3c 60%, #135c2d 100%);
    text-align: center;
    padding: 24px;
  }
  .box {
    background: #fff;
    border-radius: 18px;
    padding: 40px 32px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 24px 80px rgba(0,0,0,.35);
  }
  .logo {
    width: 96px;
    height: 96px;
    border-radius: 20px;
    margin: 0 auto 18px;
    display: block;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  h1 {
    font-size: 17px;
    font-weight: 800;
    color: #135c2d;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  p {
    font-size: 12px;
    color: #6b7280;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 4px solid #e5e7eb;
    border-top-color: #1a7a3c;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.btn {
    display: inline-block;
    width: 100%;
    padding: 12px;
    background: #1a7a3c;
    color: #fff;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    transition: background .15s;
  }
  a.btn:hover { background: #135c2d; }
  .footer-text {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="box">
    <img class="logo" src="./icon-192.png" alt="Logo STPU">
    <h1>Dashboard Tempahan<br>Sistem Tempahan Produk Unggas</h1>
    <div class="spinner"></div>
    <p>Mengalihkan ke dashboard...<br>Redirecting to dashboard...</p>
    <a class="btn" id="manualLink" href="#">Bukak Dashboard / Open Dashboard</a>
    <div class="footer-text">© Institut Teknologi Unggas (ITU)</div>
  </div>

  <script>
    var DASHBOARD_URL = 'https://script.google.com/macros/s/AKfycbxbA0IJES5WPVo-U7u5rUuTCleHzwIPYejDfwxpJ9cnDQsgpekSRKETtfDqkDnVjZJSDA/exec';

    document.getElementById('manualLink').href = DASHBOARD_URL;

    setTimeout(function () {
      window.location.href = DASHBOARD_URL;
    }, 900);
  </script>
</body>
</html>
